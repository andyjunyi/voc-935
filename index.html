<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國中英文會考單字複習 — 935字完全攻略</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f9ff;--surface:#fff;--border:#e0f2fe;--text:#1e293b;--muted:#64748b;
  --green:#0d9488;--red:#dc2626;--primary:#1e6c93;--primary-hover:#155a7a;
  --core:#1e6c93;--solid:#0d9488;--other:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HERO */
.hero{background:linear-gradient(135deg,#1e6c93 0%,#0ea5c9 55%,#00bad4 100%);color:white;padding:28px 24px 32px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 60%,rgba(255,255,255,.2) 0%,transparent 50%),radial-gradient(ellipse at 85% 15%,rgba(255,241,95,.22) 0%,transparent 45%);}
.hero-inner{position:relative;max-width:900px;margin:0 auto;}
.hero-badge{display:inline-block;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:100px;padding:4px 14px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
.hero h1{font-size:clamp(18px,4vw,30px);font-weight:900;letter-spacing:-.03em;margin-bottom:8px;line-height:1.2;}
.hero h1 span{color:#fbbf24;}
.hero p{color:rgba(255,255,255,.82);font-size:13px;margin-bottom:20px;}
.hero-stats{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;}
.hero-stat{text-align:center;}
.hero-stat-num{font-size:28px;font-weight:900;font-family:'DM Mono',monospace;display:block;}
.hero-stat-label{font-size:10px;opacity:.75;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}

/* GROUP TABS */
.group-tabs{position:sticky;top:0;z-index:50;background:rgba(240,249,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;}
.group-tabs-inner{max-width:960px;margin:0 auto;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;}
.group-tabs-inner::-webkit-scrollbar{display:none;}
.gtab{flex-shrink:0;padding:14px 20px;border:none;border-bottom:3px solid transparent;background:transparent;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;color:var(--muted);transition:all .2s;white-space:nowrap;}
.gtab:hover{color:var(--text);}
.gtab.active{color:var(--primary);border-bottom-color:var(--primary);}
.gtab.active.g-core{color:var(--core);border-bottom-color:var(--core);}
.gtab.active.g-solid{color:var(--solid);border-bottom-color:var(--solid);}
.gtab.active.g-other{color:var(--other);border-bottom-color:var(--other);}

/* MAIN CONTAINER */
.container{max-width:960px;margin:0 auto;padding:28px 20px 80px;}

/* PROGRESS BAR */
.progress-section{background:var(--surface);border-radius:14px;padding:18px 20px;margin-bottom:24px;border:1.5px solid var(--border);}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.prog-title{font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.prog-count{font-size:14px;font-weight:900;font-family:'DM Mono',monospace;}
.prog-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--primary),var(--green));transition:width .6s cubic-bezier(.4,0,.2,1);}

/* GROUP SECTION HEADER */
.group-section-header{display:flex;align-items:center;gap:12px;margin:28px 0 14px;}
.group-section-badge{padding:5px 14px;border-radius:100px;font-weight:900;font-size:13px;color:white;}
.group-section-title{font-size:16px;font-weight:900;}
.group-section-sub{font-size:12px;color:var(--muted);font-weight:600;}

/* DAY CARDS GRID */
.days-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:8px;}

.day-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:all .25s;cursor:pointer;}
.day-card:hover{border-color:#94a3b8;box-shadow:0 4px 20px rgba(0,0,0,.07);transform:translateY(-2px);}
.day-card.completed{border-color:var(--green);background:linear-gradient(135deg,#f0fdfa,#fff);}

.day-card-header{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;}
.day-num-badge{width:46px;height:46px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace;}
.day-num-badge .dnum{font-size:17px;font-weight:900;line-height:1;}
.day-num-badge .dlabel{font-size:8px;font-weight:800;letter-spacing:.06em;opacity:.65;margin-top:1px;}
.day-card-meta{flex:1;min-width:0;}
.day-card-title{font-size:14px;font-weight:800;margin-bottom:3px;}
.day-card-sub{font-size:11px;color:var(--muted);font-weight:600;}
.day-card-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:all .2s;}
.day-card.completed .day-card-check{background:var(--green);border-color:var(--green);color:white;}

.day-card-words{padding:0 16px 10px;display:flex;flex-wrap:wrap;gap:4px;}
.word-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.word-chip.known{background:#f0fdfc;color:var(--green);border-color:#99f6e4;}

.day-card-btns{padding:10px 16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:6px;border-top:1px solid var(--border);background:#f8fafc;}
.day-btn{padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .2s;color:var(--muted);text-align:center;}
.day-btn:hover{color:var(--text);border-color:#94a3b8;background:white;}
.day-btn.btn-list:hover{border-color:var(--primary);color:var(--primary);}
.day-btn.btn-flash:hover{border-color:#f59e0b;color:#d97706;}
.day-btn.btn-type:hover{border-color:var(--green);color:var(--green);}
.day-btn.btn-mcq:hover{border-color:var(--other);color:var(--other);}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:0;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;animation:fadeOverlay .2s ease;}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}

.modal{background:var(--surface);width:100%;max-width:780px;min-height:100vh;max-height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
@media(min-width:820px){
  .modal-overlay{align-items:center;padding:20px;}
  .modal{min-height:auto;max-height:90vh;border-radius:20px;box-shadow:0 25px 60px rgba(0,0,0,.25);}
}

.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--surface);z-index:10;flex-shrink:0;}
.modal-day-badge{padding:4px 12px;border-radius:8px;font-weight:900;font-size:13px;font-family:'DM Mono',monospace;color:white;flex-shrink:0;}
.modal-title{font-size:15px;font-weight:800;flex:1;min-width:0;}
.modal-word-count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.modal-nav-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;color:var(--muted);transition:all .2s;flex-shrink:0;}
.modal-nav-btn:hover{border-color:#94a3b8;color:var(--text);}
.modal-nav-btn:disabled{opacity:.3;cursor:default;}
.modal-close{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);transition:all .2s;flex-shrink:0;}
.modal-close:hover{background:#fee2e2;border-color:#fca5a5;color:var(--red);}

.modal-tabs{padding:0 20px;border-bottom:1px solid var(--border);display:flex;gap:0;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.modal-tabs::-webkit-scrollbar{display:none;}
.mtab{padding:12px 18px;border:none;border-bottom:3px solid transparent;background:transparent;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;color:var(--muted);transition:all .2s;white-space:nowrap;}
.mtab:hover{color:var(--text);}
.mtab.active{color:var(--primary);border-bottom-color:var(--primary);}

.modal-body{flex:1;padding:20px;overflow-y:auto;}

/* ── WORD LIST (Tab 1) ── */
.wordlist-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.print-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:6px;transition:all .2s;}
.print-btn:hover{border-color:var(--primary);color:var(--primary);}
.wl-known-count{font-size:12px;color:var(--green);font-weight:700;margin-left:auto;font-family:'DM Mono',monospace;}

.word-table{width:100%;border-collapse:collapse;font-size:13px;}
.word-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:2px solid var(--border);}
.word-table td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
.word-table tr:last-child td{border-bottom:none;}
.word-table tr:hover td{background:#f8fafc;}
.word-table tr.known-row td{background:#f0fdfc;}
.wt-en{font-weight:900;font-size:14px;color:var(--primary);}
.wt-ph{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
.wt-zh{font-weight:700;}
.wt-pos{display:inline-block;font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;margin-right:4px;background:#e0f2fe;color:var(--primary);font-family:'DM Mono',monospace;}
.wt-ex{font-size:11px;color:#475569;line-height:1.6;}
.wt-exz{font-size:11px;color:var(--muted);margin-top:2px;}
.know-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.know-btn:hover{border-color:var(--green);background:#f0fdfc;}
.know-btn.known{background:var(--green);border-color:var(--green);color:white;}

/* ── FLASHCARD (Tab 2) ── */
.fc-section{max-width:500px;margin:0 auto;}
.fc-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
.fc-shuffle-btn{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;color:var(--muted);transition:all .2s;}
.fc-shuffle-btn:hover{border-color:#94a3b8;color:var(--text);}
.fc-score-disp{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

.fc-prog{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:16px;}
.fc-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--green));transition:width .3s ease;}

.fc-wrap{perspective:1200px;margin-bottom:16px;}
.fc-card{
  width:100%;aspect-ratio:5/3;position:relative;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  cursor:pointer;border-radius:18px;
}
.fc-card.flipped{transform:rotateY(180deg);}
.fc-face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:18px;border:1.5px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;text-align:center;gap:6px;
}
.fc-front{background:white;}
.fc-back{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);transform:rotateY(180deg);}
.fc-hint{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.1em;}
.fc-speak-btn{background:none;border:none;cursor:pointer;font-size:28px;line-height:1;padding:4px;border-radius:50%;transition:transform .1s,opacity .15s;opacity:.55;}
.fc-speak-btn:hover{opacity:1;transform:scale(1.15);}
.fc-speak-btn:active{transform:scale(.92);}
.fc-word{font-size:clamp(26px,6vw,40px);font-weight:900;color:var(--primary);}
.fc-ph{font-family:'DM Mono',monospace;font-size:15px;color:var(--muted);}
.fc-pos-badge{font-size:14px;font-weight:800;padding:2px 8px;border-radius:5px;background:#e0f2fe;color:var(--primary);font-family:'DM Mono',monospace;}
.fc-zh{font-size:clamp(16px,4vw,26px);font-weight:900;color:var(--text);}
.fc-ex{font-size:17px;color:#374151;line-height:1.7;max-width:340px;}
.fc-exz{font-size:15px;color:var(--muted);}

.fc-nav{display:flex;align-items:center;justify-content:center;gap:10px;}
.fc-nav-btn{padding:8px 22px;border-radius:9px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;color:var(--muted);}
.fc-nav-btn:hover:not(:disabled){border-color:#94a3b8;color:var(--text);}
.fc-nav-btn.fc-primary{background:var(--primary);color:white;border-color:var(--primary);}
.fc-nav-btn.fc-primary:hover:not(:disabled){background:var(--primary-hover);}
.fc-nav-btn:disabled{opacity:.3;cursor:default;}
.fc-counter{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);min-width:56px;text-align:center;}

.fc-result{text-align:center;padding:32px 24px;background:white;border-radius:16px;border:1.5px solid var(--border);}
.fc-result-emoji{font-size:48px;margin-bottom:10px;}
.fc-result-title{font-size:20px;font-weight:900;margin-bottom:6px;}
.fc-result-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.result-btn{padding:10px 28px;border-radius:10px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;background:var(--primary);color:white;margin:4px;transition:all .2s;}
.result-btn:hover{background:var(--primary-hover);}
.result-btn.secondary{background:white;color:var(--primary);border:1.5px solid var(--primary);}
.result-btn.secondary:hover{background:#e0f2fe;}

/* ── TYPING (Tab 3) ── */
.typing-section{max-width:520px;margin:0 auto;}
.practice-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.practice-header h3{font-size:15px;font-weight:900;}
.practice-score{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--primary);}

.typing-card{background:white;border:1.5px solid var(--border);border-radius:14px;padding:24px;text-align:center;margin-bottom:12px;}
.typing-progress{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:12px;}
.typing-zh{font-size:clamp(20px,5vw,30px);font-weight:900;color:var(--text);margin-bottom:6px;}
.typing-pos{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:14px;}
.typing-hint{font-size:11px;color:var(--muted);margin-bottom:10px;}
.typing-input{width:100%;max-width:260px;padding:11px 16px;border:2px solid var(--border);border-radius:10px;font-family:'DM Mono',monospace;font-size:16px;font-weight:700;text-align:center;outline:none;transition:all .2s;background:white;}
.typing-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,108,147,.1);}
.typing-input.correct{border-color:var(--green);background:#f0fdfc;color:var(--green);}
.typing-input.wrong{border-color:var(--red);background:#fef2f2;color:var(--red);}
.typing-feedback{min-height:26px;font-size:13px;font-weight:700;margin-top:10px;}
.typing-feedback.ok{color:var(--green);}
.typing-feedback.err{color:var(--red);}
.typing-nav{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.t-btn{padding:9px 22px;border-radius:9px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;transition:all .2s;}
.t-btn-primary{background:var(--primary);color:white;}
.t-btn-primary:hover{background:var(--primary-hover);}
.t-btn-skip{background:var(--border);color:var(--muted);}
.t-btn-skip:hover{background:#cbd5e1;}

/* ── MCQ (Tab 4) ── */
.mcq-section{max-width:560px;margin:0 auto;}
.mcq-card{background:white;border:1.5px solid var(--border);border-radius:14px;padding:22px;margin-bottom:12px;}
.mcq-progress{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:12px;}
.mcq-q{font-size:15px;font-weight:700;color:var(--text);line-height:1.8;margin-bottom:18px;}
.mcq-blank{display:inline-block;border-bottom:3px solid var(--primary);min-width:80px;height:22px;margin:0 4px;vertical-align:bottom;}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mcq-opt{padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);background:white;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;text-align:center;}
.mcq-opt:hover:not(:disabled){border-color:var(--primary);background:#e0f2fe;}
.mcq-opt.correct{border-color:var(--green)!important;background:#f0fdfc!important;color:var(--green);}
.mcq-opt.wrong{border-color:var(--red)!important;background:#fef2f2!important;color:var(--red);}
.mcq-opt.faded{opacity:.35;}
.mcq-opt:disabled{cursor:default;}
.mcq-explanation{margin-top:12px;padding:12px 14px;background:#f8fafc;border-radius:8px;font-size:12px;color:#475569;line-height:1.7;border:1px solid var(--border);}
.mcq-next-btn{display:none;margin-top:12px;width:100%;padding:10px;border-radius:10px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;background:var(--primary);color:white;transition:all .2s;}
.mcq-next-btn:hover{background:var(--primary-hover);}
.mcq-next-btn.visible{display:block;}

/* ── SENTENCE PRACTICE (Tab 5) ── */
.sent-section{max-width:720px;margin:0 auto;}
.sent-card{background:white;border:1.5px solid var(--border);border-radius:14px;padding:24px;margin-bottom:12px;}
.sent-zh{font-size:17px;font-weight:700;color:var(--text);text-align:center;line-height:2;margin-bottom:28px;padding-bottom:16px;border-bottom:1.5px dashed var(--border);}
.sent-words-row{text-align:center;padding:4px 0 12px;line-height:1;}
.sent-token{display:inline-flex;flex-direction:column;align-items:center;vertical-align:bottom;margin:9px 16px;}
.sent-token-boxes{display:flex;gap:4px;align-items:center;}
.sent-apostrophe{font-size:18px;font-weight:700;color:var(--text);line-height:1;margin:0 1px;}
.sent-token-hint{font-size:11px;font-weight:700;color:var(--muted);text-align:center;min-height:16px;white-space:nowrap;margin-top:5px;}
.sent-token-punct{display:inline-block;font-size:22px;font-weight:700;color:var(--muted);vertical-align:bottom;padding-bottom:16px;line-height:1;margin:9px 4px 9px -12px;}
.sent-token.word-done .sent-token-hint{color:var(--green);}
.sent-token.word-active .sent-lb:not(.correct):not(.revealed){border-color:var(--primary);}
.letter-boxes{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.letter-box{width:38px;height:46px;border:2px solid var(--border);border-radius:8px;font-size:20px;font-weight:900;text-align:center;font-family:'DM Mono',monospace;background:white;outline:none;transition:border-color .15s,background .15s;color:var(--text);text-transform:lowercase;padding:0;cursor:text;}
.letter-box:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,108,147,.12);}
.letter-box.filled{border-color:#94a3b8;}
.letter-box.correct{border-color:var(--green)!important;background:#f0fdfc;color:var(--green);}
.letter-box.wrong{border-color:var(--red)!important;background:#fef2f2;color:var(--red);}
.letter-box.revealed{border-color:#f59e0b!important;background:#fffbeb;color:#d97706;}
.sent-lb{text-transform:none!important;width:32px;height:40px;font-size:18px;}
.sent-feedback{min-height:28px;font-size:13px;font-weight:700;text-align:center;margin:12px 0 4px;padding:6px 14px;border-radius:8px;display:inline-block;}
.sent-feedback.ok{color:var(--green);background:#f0fdfc;}
.sent-feedback.err{color:var(--red);background:#fef2f2;}
.sent-feedback.info{color:var(--muted);}
.sent-feedback-wrap{text-align:center;}
.sent-done-panel{text-align:center;padding:16px 0 4px;}
.sent-done-msg{font-size:17px;font-weight:900;margin-bottom:4px;color:var(--green);}
.sent-done-sub{font-size:13px;color:var(--muted);}

/* PRINT STYLES */
@media print{
  body * { visibility: hidden; }
  .print-area, .print-area * { visibility: visible; }
  .print-area { position: fixed; top: 0; left: 0; width: 100%; padding: 20px; }
  .modal-overlay, .group-tabs, .hero, .container { display: none !important; }

  .print-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .print-table th { padding: 6px 8px; border-bottom: 2px solid #333; font-weight: bold; }
  .print-table td { padding: 6px 8px; border-bottom: 1px solid #ddd; }
  .print-header { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
  @page { margin: 15mm; }
}

/* ANIMATIONS */
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.confetti-piece{position:fixed;pointer-events:none;z-index:9999;will-change:transform;}

.hidden{display:none!important;}
</style>

// ============================================================
// LOCAL STORAGE HELPERS
// ============================================================
function loadProgress() {
  try { return JSON.parse(localStorage.getItem('voc935_progress') || '{}'); } catch { return {}; }
}
function saveProgress(p) {
  localStorage.setItem('voc935_progress', JSON.stringify(p));
}
function loadKnown() {
  try { return JSON.parse(localStorage.getItem('voc935_known') || '[]'); } catch { return []; }
}
function saveKnown(arr) {
  localStorage.setItem('voc935_known', JSON.stringify(arr));
}

let knownWords = new Set(loadKnown());
let progress = loadProgress();

// ============================================================
// RENDER DAY CARDS
// ============================================================
function switchGroup(g) {
  currentGroup = g;
  document.querySelectorAll('.gtab').forEach(btn => btn.classList.remove('active'));
  const idx = ['all','核心','鞏固','其他'].indexOf(g);
  document.querySelectorAll('.gtab')[idx].classList.add('active');
  renderDays();
}

function renderDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';

  const filteredGroups = currentGroup === 'all'
    ? ['核心','鞏固','其他']
    : [currentGroup];

  filteredGroups.forEach(group => {
    const groupDays = DAYS.filter(d => d.group === group);
    const colors = { '核心': '#1e6c93', '鞏固': '#0d9488', '其他': '#7c3aed' };
    const color = colors[group];
    const dayRange = group === '核心' ? 'Day 1–9' : group === '鞏固' ? 'Day 10–24' : 'Day 25–32';
    const wordCount = group === '核心' ? 245 : group === '鞏固' ? 450 : 240;

    // Section header
    const header = document.createElement('div');
    header.className = 'group-section-header';
    header.innerHTML = `
      <div class="group-section-badge" style="background:${color}">${group}單字</div>
      <div>
        <div class="group-section-title">${dayRange}</div>
        <div class="group-section-sub">${wordCount} 個單字</div>
      </div>
    `;
    container.appendChild(header);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'days-grid';

    groupDays.forEach(dayData => {
      const dayKey = `day_${dayData.day}`;
      const isDone = !!progress[dayKey];
      const knownCount = dayData.words.filter(w => knownWords.has(w.w)).length;

      const card = document.createElement('div');
      card.className = 'day-card' + (isDone ? ' completed' : '');
      card.innerHTML = `
        <div class="day-card-header">
          <div class="day-num-badge" style="background:${color}22;color:${color}">
            <span class="dnum">${dayData.day}</span>
            <span class="dlabel">DAY</span>
          </div>
          <div class="day-card-meta">
            <div class="day-card-title">${group}單字 Day ${dayData.day}</div>
            <div class="day-card-sub">${dayData.words.length} 個單字 · 已認識 ${knownCount}</div>
          </div>
          <div class="day-card-check">${isDone ? '✓' : ''}</div>
        </div>
        <div class="day-card-words">
          ${dayData.words.slice(0,8).map(w => `<span class="word-chip${knownWords.has(w.w) ? ' known' : ''}">${w.w}</span>`).join('')}
          ${dayData.words.length > 8 ? `<span class="word-chip">+${dayData.words.length - 8}</span>` : ''}
        </div>
        <div class="day-card-btns">
          <button class="day-btn btn-list" onclick="openModal(${dayData.day - 1}, 'list'); event.stopPropagation()">📋 單字表</button>
          <button class="day-btn btn-flash" onclick="openModal(${dayData.day - 1}, 'flash'); event.stopPropagation()">🃏 閃卡</button>
          <button class="day-btn btn-type" onclick="openModal(${dayData.day - 1}, 'type'); event.stopPropagation()">✍️ 中翻英</button>
          <button class="day-btn btn-mcq" onclick="openModal(${dayData.day - 1}, 'mcq'); event.stopPropagation()">🎯 選擇題</button>
        </div>
      `;
      card.addEventListener('click', () => openModal(dayData.day - 1, 'list'));
      grid.appendChild(card);
    });

    container.appendChild(grid);
  });

  updateProgress();
}

function updateProgress() {
  const done = Object.keys(progress).filter(k => progress[k]).length;
  const total = 32;
  document.getElementById('prog-count').textContent = `${done} / ${total} 天完成`;
  document.getElementById('prog-fill').style.width = `${(done/total*100).toFixed(1)}%`;
}

// ============================================================
// MODAL
// ============================================================
function openModal(dayIdx, tab) {
  currentDayIdx = dayIdx;
  currentTab = tab;
  modalWords = DAYS[dayIdx].words;
  updateModalHeader();
  switchTab(tab);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  renderDays();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function navigateDay(dir) {
  const newIdx = currentDayIdx + dir;
  if (newIdx < 0 || newIdx >= DAYS.length) return;
  openModal(newIdx, currentTab);
}

function updateModalHeader() {
  const day = DAYS[currentDayIdx];
  const colors = { '核心': '#1e6c93', '鞏固': '#0d9488', '其他': '#7c3aed' };
  const color = colors[day.group];

  const badge = document.getElementById('modal-day-badge');
  badge.textContent = `Day ${day.day}`;
  badge.style.background = color;

  document.getElementById('modal-title').textContent = `${day.group}單字 Day ${day.day}`;
  document.getElementById('modal-word-count').textContent = `${day.words.length} 個單字`;

  document.getElementById('modal-prev').disabled = currentDayIdx === 0;
  document.getElementById('modal-next').disabled = currentDayIdx === DAYS.length - 1;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.mtab').forEach((t, i) => {
    t.classList.toggle('active', ['list','flash','type','mcq','sent'][i] === tab);
  });
  renderModalContent();
}

function renderModalContent() {
  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  if (currentTab === 'list') renderWordList(body);
  else if (currentTab === 'flash') renderFlashcard(body);
  else if (currentTab === 'type') renderTyping(body);
  else if (currentTab === 'mcq') renderMCQ(body);
  else if (currentTab === 'sent') renderSentence(body);
}

function extractPOS(zh) {
  const m = zh.match(/^\(([^)]+)\)/);
  return m ? m[1] : '';
}
function extractMeaning(zh) {
  return zh.replace(/^\([^)]+\)\s*/, '');
}

function renderWordList(container) {
  const words = modalWords;
  const knownCount = words.filter(w => knownWords.has(w.w)).length;

  const toolbar = document.createElement('div');
  toolbar.className = 'wordlist-toolbar';
  toolbar.innerHTML = `
    <button class="print-btn" onclick="printWordList()">🖨️ 列印單字表</button>
    <span class="wl-known-count">已認識: ${knownCount} / ${words.length}</span>
  `;
  container.appendChild(toolbar);

  const table = document.createElement('table');
  table.className = 'word-table';
  table.innerHTML = `
    <thead>
      <tr>
        <th>英文</th>
        <th>中譯</th>
        <th>例句</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="wl-tbody"></tbody>
  `;
  container.appendChild(table);

  const tbody = table.querySelector('#wl-tbody');
  words.forEach((w, i) => {
    const pos = extractPOS(w.zh);
    const meaning = extractMeaning(w.zh);
    const isKnown = knownWords.has(w.w);
    const tr = document.createElement('tr');
    tr.className = isKnown ? 'known-row' : '';
    tr.id = `wl-row-${i}`;
    tr.innerHTML = `
      <td>
        <div class="wt-en">${w.w}</div>
        <div class="wt-ph">${w.ph || ''}</div>
      </td>
      <td class="wt-zh">
        ${pos ? `<span class="wt-pos">${pos}</span>` : ''}<br>${meaning}
      </td>
      <td>
        <div class="wt-ex">${w.ex || ''}</div>
        <div class="wt-exz">${w.exz || ''}</div>
      </td>
      <td>
        <button class="know-btn ${isKnown ? 'known' : ''}" id="know-btn-${i}" onclick="toggleKnown('${w.w}', ${i})" title="標記為已認識">
          ${isKnown ? '✓' : '○'}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleKnown(word, idx) {
  if (knownWords.has(word)) {
    knownWords.delete(word);
  } else {
    knownWords.add(word);
  }
  saveKnown([...knownWords]);

  const btn = document.getElementById(`know-btn-${idx}`);
  const row = document.getElementById(`wl-row-${idx}`);
  const isKnown = knownWords.has(word);
  btn.className = 'know-btn' + (isKnown ? ' known' : '');
  btn.textContent = isKnown ? '✓' : '○';
  row.className = isKnown ? 'known-row' : '';

  const words = modalWords;
  const knownCount = words.filter(w => knownWords.has(w.w)).length;
  document.querySelector('.wl-known-count').textContent = `已認識: ${knownCount} / ${words.length}`;
}

function printWordList() {
  const day = DAYS[currentDayIdx];
  const words = modalWords;
  let html = `<div class="print-header">Day ${day.day} — ${day.group}單字 (${words.length} 個)</div>`;
  html += `<table class="print-table">
    <thead><tr><th>#</th><th>英文</th><th>音標</th><th>中譯</th><th>例句</th></tr></thead>
    <tbody>`;
  words.forEach((w, i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td><strong>${w.w}</strong></td>
      <td style="font-family:monospace;font-size:11px">${w.ph || ''}</td>
      <td>${w.zh}</td>
      <td style="font-size:11px">${w.ex || ''}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  const printArea = document.getElementById('print-area');
  printArea.innerHTML = html;
  printArea.style.display = 'block';
  window.print();
  printArea.style.display = 'none';
}

function renderFC() {
  const sec = document.getElementById('fc-section');
  if (!sec) return;

  if (fcIdx >= fcWords.length) {
    renderFCResult(sec);
    return;
  }

  const w = fcWords[fcIdx];
  const pos = extractPOS(w.zh);
  const meaning = extractMeaning(w.zh);
  const pct = (fcIdx / fcWords.length * 100).toFixed(1);

  sec.innerHTML = `
    <div class="fc-toolbar">
      <button class="fc-shuffle-btn" onclick="shuffleFC()">🔀 隨機排列</button>
      <span class="fc-score-disp">已認識: ${fcKnown.size}/${fcWords.length}</span>
    </div>
    <div class="fc-prog"><div class="fc-prog-fill" style="width:${pct}%"></div></div>
    <div class="fc-wrap">
      <div class="fc-card" id="fc-card" onclick="flipFC()">
        <div class="fc-face fc-front">
          <span class="fc-hint">點擊翻牌</span>
          <div class="fc-word">${w.w}</div>
          <button class="fc-speak-btn" onclick="event.stopPropagation();speakWord('${w.w}')" title="發音 (↑)">🔊</button>
          <div class="fc-ph">${w.ph || ''}</div>
        </div>
        <div class="fc-face fc-back">
          <div style="display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;">
            ${pos ? `<span class="fc-pos-badge">${pos}</span>` : ''}
            <span class="fc-zh">${meaning}</span>
          </div>
          <div class="fc-ex">${highlightKeyword(w.ex || '', w.w)}</div>
          <div class="fc-exz">${w.exz || ''}</div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn" onclick="fcNav(-1)" ${fcIdx === 0 ? 'disabled' : ''}>&#8592;</button>
      <span class="fc-counter">${fcIdx + 1} / ${fcWords.length}</span>
      <button class="fc-nav-btn fc-primary" onclick="fcNav(1)" ${fcIdx === fcWords.length - 1 ? 'disabled' : ''}>&#8594;</button>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
      <button class="t-btn t-btn-skip" onclick="fcMarkKnown(false)">🙁 不熟</button>
      <button class="t-btn t-btn-primary" onclick="fcMarkKnown(true)">😊 認識</button>
    </div>
  `;
  if (fcFlipped) {
    const card = document.getElementById('fc-card');
    if (card) card.classList.add('flipped');
  } else {
    speakWord(w.w);
  }
}

function highlightKeyword(sentence, word) {
  if (!sentence || !word) return sentence;
  const w = word.toLowerCase();
  const forms = new Set([w]);
  forms.add(w + 's');
  forms.add(w + 'es');
  forms.add(w + 'ed');
  forms.add(w + 'd');
  forms.add(w + 'ing');
  forms.add(w + 'er');
  forms.add(w + 'est');
  if (w.endsWith('y')) {
    forms.add(w.slice(0, -1) + 'ies');
    forms.add(w.slice(0, -1) + 'ied');
  }
  const escaped = [...forms].map(f => f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  escaped.sort((a, b) => b.length - a.length);
  const regex = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'i');
  return sentence.replace(regex, '<u><strong>$1</strong></u>');
}

function _getWordZh(wordStr) {
  const lower = wordStr.replace(/[\u2018\u2019\u02BC]/g,"'").toLowerCase().replace(/[^a-z']/g,'');
  const map = _getVocabMap();
  const look = w => map.has(w) ? extractMeaning(map.get(w).zh) : (_COMMON_ZH[w] || '');

  let r = look(lower);
  if (r) return r;
  const plain = lower.replace(/'/g,'');
  r = look(plain);
  if (r) return r;

  const w = plain;
  const candidates = [];
  if (w.endsWith('ies'))  candidates.push(w.slice(0,-3)+'y');
  if (w.endsWith('ied'))  candidates.push(w.slice(0,-3)+'y');
  if (w.endsWith('ves'))  candidates.push(w.slice(0,-3)+'f', w.slice(0,-3)+'fe');
  if (w.endsWith('ing'))  { candidates.push(w.slice(0,-3)); candidates.push(w.slice(0,-3)+'e'); }
  if (w.endsWith('ed'))   { candidates.push(w.slice(0,-2)); candidates.push(w.slice(0,-1)); candidates.push(w.slice(0,-2)+'e'); }
  if (w.endsWith('er'))   { candidates.push(w.slice(0,-2)); candidates.push(w.slice(0,-2)+'e'); }
  if (w.endsWith('est'))  { candidates.push(w.slice(0,-3)); candidates.push(w.slice(0,-3)+'e'); }
  if (w.endsWith('es'))   candidates.push(w.slice(0,-2), w.slice(0,-1));
  if (w.endsWith('s') && !w.endsWith('ss')) candidates.push(w.slice(0,-1));
  if (w.endsWith('ing') && w.length > 5 && w[w.length-4] === w[w.length-5]) candidates.push(w.slice(0,-4));
  if (w.endsWith('ed')  && w.length > 4 && w[w.length-3] === w[w.length-4]) candidates.push(w.slice(0,-3));

  for (const c of candidates) {
    if (!c) continue;
    r = look(c);
    if (r) return r;
  }
  return '';
}

function _parseSentence(ex) {
  ex = ex.replace(/[\u2018\u2019\u02BC]/g, "'");
  const tokens = [];
  const re = /([A-Za-z][A-Za-z']*)([^A-Za-z']*)/g;
  let m;
  while ((m = re.exec(ex)) !== null) {
    const word   = m[1];
    const after  = m[2];
    const punct  = after.trim().replace(/\s/g,'');
    const target = word.toLowerCase().replace(/[^a-z]/g,'');
    if (!target) continue;
    tokens.push({ word, target, punct: punct||'', zh: _getWordZh(word), correct: false, hintCount: 0 });
  }
  return tokens;
}

function renderSentence(body) {
  sentWords = modalWords.filter(w => w.ex && w.exz);
  sentIdx   = 0;
  sentScore = 0;
  sentDone  = false;
  if (!sentWords.length) {
    body.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);font-weight:700">此天沒有例句資料</div>`;
    return;
  }
  _renderSentCard(body);
}

function _renderSentCard(body) {
  if (sentIdx >= sentWords.length) { _renderSentResult(body); return; }
  const w = sentWords[sentIdx];
  _sentTokens = _parseSentence(w.ex);
  _sentFocus  = 0;
  sentDone    = false;

  let tokensHTML = '';
  _sentTokens.forEach((t, ti) => {
    let boxesHTML = '';
    let bi = 0;
    for (const ch of t.word) {
      if (ch === "'") {
        boxesHTML += `<span class="sent-apostrophe">'</span>`;
      } else if (/[a-zA-Z]/.test(ch)) {
        boxesHTML += `<input class="letter-box sent-lb" id="slb-${ti}-${bi}" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" data-ti="${ti}" data-bi="${bi}">`;
        bi++;
      }
    }
    const hintHTML = `<div class="sent-token-hint" id="shint-${ti}">${t.zh || ''}</div>`;
    const punctHTML = t.punct ? `<span class="sent-token-punct">${t.punct}</span>` : '';
    tokensHTML += `<div class="sent-token" id="stok-${ti}"><div class="sent-token-boxes">${boxesHTML}</div>${hintHTML}</div>${punctHTML}`;
  });

  body.innerHTML = `
    <div class="sent-section">
      <div class="practice-header">
        <h3>句子翻譯</h3>
        <span class="practice-score">${sentIdx + 1} / ${sentWords.length}</span>
      </div>
      <div class="sent-card">
        <div class="sent-zh">${w.exz}</div>
        <div class="sent-words-row" id="sent-words-row">${tokensHTML}</div>
        <div class="sent-feedback-wrap"><span class="sent-feedback info" id="sent-feedback">輸入每個單字，按 Enter 確認</span></div>
      </div>
      <div class="typing-nav">
        <button class="t-btn t-btn-skip" onclick="nextSentence()">跳過 →</button>
      </div>
    </div>`;

  _initSentBoxes();
  _focusSentToken(0);
}

function _initSentBoxes() {
  document.querySelectorAll('.sent-lb').forEach(box => {
    const ti = +box.dataset.ti;
    const bi = +box.dataset.bi;

    box.addEventListener('keydown', e => {
      const t = _sentTokens[ti];
      if (sentDone) {
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextSentence(); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSentence(); }
        return;
      }
      if (e.key === 'Enter') { e.preventDefault(); _checkAllSentTokens(); return; }
      if (t.correct) {
        if (e.key === 'ArrowRight' || e.key === 'Tab') { e.preventDefault(); _focusSentToken(_sentFocus + 1); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); _focusSentToken(_sentFocus - 1); }
        else if (e.key === ' ') { e.preventDefault(); _focusSentToken(_sentFocus + 1); }
        return;
      }
      if (e.key === ' ')     { e.preventDefault(); _focusSentToken(_sentFocus + 1); return; }
      if (e.key === 'Tab')   { e.preventDefault(); _focusSentToken(e.shiftKey ? _sentFocus - 1 : _sentFocus + 1); return; }
      if (e.key === 'Backspace') {
        e.preventDefault();
        if (box.value) { box.value = ''; }
        else if (bi > t.hintCount) { const p = document.getElementById(`slb-${ti}-${bi-1}`); if (p) { p.value=''; p.focus(); } }
        return;
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        if (bi > t.hintCount) document.getElementById(`slb-${ti}-${bi-1}`)?.focus();
        else _focusSentToken(_sentFocus - 1);
        return;
      }
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        if (bi < t.target.length - 1) document.getElementById(`slb-${ti}-${bi+1}`)?.focus();
        else _focusSentToken(_sentFocus + 1);
        return;
      }
    });

    let _comp = false;
    box.addEventListener('compositionstart', () => { _comp = true; });
    box.addEventListener('compositionend', () => {
      _comp = false;
      const t = _sentTokens[ti];
      if (t.correct) return;
      let val = box.value.replace(/[^a-zA-Z]/g,'').slice(-1).toLowerCase();
      if (ti === 0 && bi === 0 && val) val = val.toUpperCase();
      box.value = val;
      if (val && bi < t.target.length - 1) document.getElementById(`slb-${ti}-${bi+1}`)?.focus();
    });
    box.addEventListener('input', () => {
      if (_comp) return;
      const t = _sentTokens[ti];
      if (t.correct) return;
      let val = box.value.replace(/[^a-zA-Z]/g,'').slice(-1).toLowerCase();
      if (ti === 0 && bi === 0 && val) val = val.toUpperCase();
      box.value = val;
      if (val && bi < t.target.length - 1) document.getElementById(`slb-${ti}-${bi+1}`)?.focus();
    });
  });
}

function _focusSentToken(idx) {
  const n = _sentTokens.length;
  idx = Math.max(0, Math.min(n - 1, idx));
  _sentFocus = idx;
  document.querySelectorAll('.sent-token').forEach((el, i) => el.classList.toggle('word-active', i === idx));
  const t = _sentTokens[idx];
  document.getElementById(`slb-${idx}-${t.hintCount}`)?.focus();
}

function _checkAllSentTokens() {
  const fb = document.getElementById('sent-feedback');
  let wrongCount = 0;
  let firstWrong = -1;

  _sentTokens.forEach((t, ti) => {
    if (t.correct) return;
    const boxes = [...document.querySelectorAll(`.sent-lb[data-ti="${ti}"]`)];
    const answer = boxes.map(b => b.value).join('').toLowerCase();

    if (answer === t.target) {
      t.correct = true;
      boxes.forEach(b => { b.classList.remove('revealed'); b.classList.add('correct'); b.disabled = true; });
      document.getElementById(`stok-${ti}`)?.classList.add('word-done');
    } else {
      wrongCount++;
      if (firstWrong === -1) firstWrong = ti;
      if (answer.length > 0) {
        t.hintCount = Math.min(t.hintCount + 1, t.target.length - 1);
        for (let i = 0; i < t.hintCount; i++) {
          boxes[i].value = (ti === 0 && i === 0) ? t.target[i].toUpperCase() : t.target[i];
          boxes[i].classList.add('revealed');
          boxes[i].disabled = true;
        }
        for (let i = t.hintCount; i < boxes.length; i++) {
          boxes[i].value = '';
          boxes[i].classList.remove('correct','wrong','revealed');
          boxes[i].disabled = false;
        }
      }
    }
  });

  if (wrongCount === 0) {
    sentDone = true;
    sentScore++;
    launchConfetti();
    fb.className = 'sent-feedback ok';
    fb.textContent = '✓ 整句完成！按 Enter / 空白鍵 進入下一句';
    const panel = document.createElement('div');
    panel.className = 'sent-done-panel';
    panel.innerHTML = `<div class="sent-done-msg">🎉 完成！</div><div class="sent-done-sub">第 ${sentIdx + 1} / ${sentWords.length} 句</div>`;
    document.getElementById('sent-words-row')?.after(panel);
  } else {
    fb.className = 'sent-feedback info';
    const cheers = ['加油！', '繼續努力！', 'Keep going!', 'You got this!', 'Almost there!'];
    fb.textContent = `${cheers[Math.floor(Math.random()*cheers.length)]} 還有 ${wrongCount} 個字，你可以的！`;
    _focusSentToken(firstWrong);
  }
}

function nextSentence() {
  sentIdx++;
  const body = document.getElementById('modal-body');
  if (body) _renderSentCard(body);
}

function prevSentence() {
  if (sentIdx > 0) { sentIdx--; const body = document.getElementById('modal-body'); if (body) _renderSentCard(body); }
}

function retrySentence() {
  sentIdx = 0; sentScore = 0;
  const body = document.getElementById('modal-body');
  if (body) _renderSentCard(body);
}

function _renderSentResult(body) {
  body.innerHTML = `
    <div class="sent-section">
      <div class="fc-result">
        <div class="fc-result-emoji">🏆</div>
        <div class="fc-result-title">句子翻譯完成！</div>
        <div class="fc-result-sub">完成 ${sentWords.length} 個句子</div>
        <button class="result-btn" onclick="retrySentence()">重新練習</button>
        <button class="result-btn secondary" onclick="switchTab('type')">去做中翻英</button>
      </div>
    </div>`;
}

// ── AUDIO ENGINE ─────────────────────────────────────────────
let _ttsAudio = null;

const _isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

function speakWord(word) {
  if (!word) return;
  // 手機直接用 Web Speech API（Google TTS onerror 為非同步，iOS 會封鎖）
  if (_isMobile) { _wsSpeakWord(word); return; }
  if (_ttsAudio) { _ttsAudio.onended = null; _ttsAudio.onerror = null; _ttsAudio.pause(); }
  const audio = new Audio('https://translate.google.com/translate_tts?ie=UTF-8&tl=en-US&client=tw-ob&q=' + encodeURIComponent(word));
  _ttsAudio = audio;
  audio.onerror = () => _wsSpeakWord(word);
  audio.play().catch(() => _wsSpeakWord(word));
}
function _wsSpeakWord(word) {
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function flipFC() {
  const card = document.getElementById('fc-card');
  if (!card) return;
  fcFlipped = !fcFlipped;
  card.classList.toggle('flipped', fcFlipped);
  if (!fcFlipped && fcWords[fcIdx]) speakWord(fcWords[fcIdx].w);
}

function fcNav(dir) {
  const newIdx = fcIdx + dir;
  if (newIdx < 0 || newIdx >= fcWords.length) return;
  fcIdx = newIdx;
  fcFlipped = false;
  renderFC();
}

function fcMarkKnown(known) {
  if (known) fcKnown.add(fcWords[fcIdx].w);
  else fcKnown.delete(fcWords[fcIdx].w);
  if (fcIdx < fcWords.length - 1) {
    fcIdx++;
    fcFlipped = false;
    renderFC();
  } else {
    renderFCResult(document.getElementById('fc-section'));
  }
}

function shuffleFC() {
  for (let i = fcWords.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcWords[i], fcWords[j]] = [fcWords[j], fcWords[i]];
  }
  fcIdx = 0;
  fcFlipped = false;
  renderFC();
}

function renderFCResult(sec) {
  const pct = Math.round(fcKnown.size / fcWords.length * 100);
  sec.innerHTML = `
    <div class="fc-result">
      <div class="fc-result-emoji">${pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚'}</div>
      <div class="fc-result-title">${pct >= 80 ? '太棒了！' : pct >= 50 ? '繼續加油！' : '多練習幾次！'}</div>
      <div class="fc-result-sub">認識了 ${fcKnown.size} / ${fcWords.length} 個單字 (${pct}%)</div>
      <button class="result-btn" onclick="restartFC()">再來一次</button>
      <button class="result-btn secondary" onclick="switchTab('type')">去做中翻英</button>
    </div>
  `;
  markDayDone();
}

function restartFC() {
  fcIdx = 0;
  fcFlipped = false;
  fcKnown = new Set();
  renderFC();
}

function renderTyping(container) {
  typWords = [...modalWords];
  typIdx = 0;
  typScore = 0;
  typAnswered = false;

  const sec = document.createElement('div');
  sec.className = 'typing-section';
  sec.id = 'typ-section';
  container.appendChild(sec);
  renderTypCard();
}

function renderTypCard() {
  const sec = document.getElementById('typ-section');
  if (!sec) return;

  if (typIdx >= typWords.length) {
    renderTypResult(sec);
    return;
  }

  const w = typWords[typIdx];
  const pos = extractPOS(w.zh);
  const meaning = extractMeaning(w.zh);

  let boxesHTML = '';
  for (let i = 0; i < w.w.length; i++) {
    boxesHTML += `<input class="letter-box" id="typ-lb-${i}" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" data-idx="${i}">`;
  }

  sec.innerHTML = `
    <div class="practice-header">
      <h3>中翻英練習</h3>
      <span class="practice-score" id="typ-score">得分: ${typScore} / ${typIdx}</span>
    </div>
    <div class="typing-card">
      <div class="typing-progress">${typIdx + 1} / ${typWords.length}</div>
      <div class="typing-zh">${meaning}</div>
      ${pos ? `<div class="typing-pos">詞性：${pos}</div>` : ''}
      <div class="letter-boxes">${boxesHTML}</div>
      <div class="typing-feedback" id="typ-feedback"></div>
    </div>
    <div class="typing-nav">
      <button class="t-btn t-btn-primary" id="typ-submit" onclick="submitTyping()">確認</button>
      <button class="t-btn t-btn-skip" onclick="skipTyping()">跳過</button>
    </div>
  `;

  _initTypBoxes(w.w);
  document.getElementById('typ-lb-0')?.focus();
  typAnswered = false;
}

function _initTypBoxes(word) {
  document.querySelectorAll('[id^="typ-lb-"]').forEach(box => {
    const idx = +box.dataset.idx;
    box.addEventListener('keydown', e => {
      if (typAnswered) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); nextTyping(); }
        return;
      }
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); submitTyping(); return; }
      if (e.key === 'Backspace') {
        e.preventDefault();
        if (box.value) { box.value = ''; }
        else if (idx > 0) { const p = document.getElementById(`typ-lb-${idx-1}`); if (p) { p.value = ''; p.focus(); } }
        return;
      }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); document.getElementById(`typ-lb-${idx-1}`)?.focus(); return; }
      if (e.key === 'ArrowRight') { e.preventDefault(); document.getElementById(`typ-lb-${idx+1}`)?.focus(); return; }
    });
    let _comp = false;
    box.addEventListener('compositionstart', () => { _comp = true; });
    box.addEventListener('compositionend', () => {
      _comp = false;
      box.value = box.value.replace(/[^a-zA-Z]/g, '').slice(-1).toLowerCase();
      if (box.value && idx < word.length - 1) document.getElementById(`typ-lb-${idx+1}`)?.focus();
    });
    box.addEventListener('input', () => {
      if (_comp) return;
      box.value = box.value.replace(/[^a-zA-Z]/g, '').slice(-1).toLowerCase();
      if (box.value && idx < word.length - 1) document.getElementById(`typ-lb-${idx+1}`)?.focus();
    });
  });
}

function submitTyping() {
  if (typAnswered) { nextTyping(); return; }
  const word = typWords[typIdx].w.toLowerCase();
  const boxes = [...document.querySelectorAll('[id^="typ-lb-"]')];
  const answer = boxes.map(b => b.value).join('');
  const feedback = document.getElementById('typ-feedback');
  const submitBtn = document.getElementById('typ-submit');

  typAnswered = true;

  if (answer === word) {
    boxes.forEach(b => { b.classList.add('correct'); b.disabled = true; });
    feedback.className = 'typing-feedback ok';
    feedback.textContent = '✓ 正確！';
    typScore++;
    knownWords.add(typWords[typIdx].w);
    saveKnown([...knownWords]);
  } else {
    boxes.forEach((b, i) => {
      b.classList.add(b.value === word[i] ? 'correct' : 'wrong');
      b.disabled = true;
    });
    feedback.className = 'typing-feedback err';
    feedback.innerHTML = `✗ 正確答案：<strong>${word}</strong>`;
  }

  if (submitBtn) submitBtn.textContent = '下一題 →';
  document.getElementById('typ-score').textContent = `得分: ${typScore} / ${typIdx + 1}`;
}

function skipTyping() {
  if (typAnswered) { nextTyping(); return; }
  typAnswered = true;
  const word = typWords[typIdx].w.toLowerCase();
  const boxes = [...document.querySelectorAll('[id^="typ-lb-"]')];
  boxes.forEach((b, i) => { b.value = word[i]; b.classList.add('revealed'); b.disabled = true; });
  const feedback = document.getElementById('typ-feedback');
  if (feedback) { feedback.className = 'typing-feedback err'; feedback.innerHTML = `答案：<strong>${word}</strong>`; }
  const submitBtn = document.getElementById('typ-submit');
  if (submitBtn) submitBtn.textContent = '下一題 →';
  document.getElementById('typ-score').textContent = `得分: ${typScore} / ${typIdx + 1}`;
}

function nextTyping() {
  typIdx++;
  typAnswered = false;
  renderTypCard();
}

function renderTypResult(sec) {
  const pct = typWords.length > 0 ? Math.round(typScore / typWords.length * 100) : 0;
  sec.innerHTML = `
    <div class="fc-result">
      <div class="fc-result-emoji">${pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚'}</div>
      <div class="fc-result-title">${pct >= 80 ? '英文拼字達人！' : pct >= 50 ? '不錯哦！繼續努力！' : '多練幾次就會了！'}</div>
      <div class="fc-result-sub">答對 ${typScore} / ${typWords.length} 題 (${pct}%)</div>
      <button class="result-btn" onclick="retryTyping()">重新練習</button>
      <button class="result-btn secondary" onclick="switchTab('mcq')">去做選擇題</button>
    </div>
  `;
  markDayDone();
}

function retryTyping() {
  typWords = [...modalWords];
  typIdx = 0;
  typScore = 0;
  typAnswered = false;
  renderTypCard();
}

// ============================================================
// MCQ
// ============================================================
function renderMCQ(container) {
  mcqWords = [...modalWords];
  mcqIdx = 0;
  mcqScore = 0;
  mcqAnswered = false;

  const sec = document.createElement('div');
  sec.className = 'mcq-section';
  sec.id = 'mcq-section';
  container.appendChild(sec);
  renderMCQCard();
}

function renderMCQCard() {
  const sec = document.getElementById('mcq-section');
  if (!sec) return;

  if (mcqIdx >= mcqWords.length) {
    renderMCQResult(sec);
    return;
  }

  const w = mcqWords[mcqIdx];
  const pos = extractPOS(w.zh);
  const meaning = extractMeaning(w.zh);

  // Build 4 options: correct + 3 distractors
  const distractors = mcqWords
    .filter((_, i) => i !== mcqIdx)
    .sort(() => Math.random() - 0.5)
    .slice(0, 3)
    .map(d => d.w);

  const options = [w.w, ...distractors].sort(() => Math.random() - 0.5);

  // Determine question type: fill-blank if exact word (with word boundaries) appears in example, else meaning
  let questionHtml = '';
  if (w.ex) {
    const regex = new RegExp('\\b' + w.w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
    const blankedEx = w.ex.replace(regex, '<span class="mcq-blank"></span>');
    if (blankedEx !== w.ex) {
      questionHtml = blankedEx;
    } else {
      questionHtml = `下列哪個單字的意思是「<strong>${meaning}</strong>」？`;
    }
  } else {
    questionHtml = `下列哪個單字的意思是「<strong>${meaning}</strong>」？`;
  }

  sec.innerHTML = `
    <div class="practice-header">
      <h3>選擇題練習</h3>
      <span class="practice-score" id="mcq-score-disp">得分: ${mcqScore} / ${mcqIdx}</span>
    </div>
    <div class="mcq-card">
      <div class="mcq-progress">${mcqIdx + 1} / ${mcqWords.length}</div>
      <div class="mcq-q">${questionHtml}</div>
      <div class="mcq-opts" id="mcq-opts">
        ${options.map((opt, i) => `
          <button class="mcq-opt" onclick="selectMCQ('${opt}', '${w.w}')" id="mcq-opt-${i}">
            ${String.fromCharCode(65+i)}. ${opt}
          </button>
        `).join('')}
      </div>
      <div id="mcq-explanation" class="mcq-explanation" style="display:none"></div>
      <button class="mcq-next-btn" id="mcq-next-btn" onclick="nextMCQ()">下一題 →</button>
    </div>
  `;
  mcqAnswered = false;
}

function selectMCQ(chosen, correct) {
  if (mcqAnswered) return;
  mcqAnswered = true;

  const isCorrect = chosen === correct;
  if (isCorrect) {
    mcqScore++;
    knownWords.add(correct);
    saveKnown([...knownWords]);
  }

  // Find and highlight options
  const opts = document.querySelectorAll('.mcq-opt');
  opts.forEach(btn => {
    const optWord = btn.textContent.trim().replace(/^[A-D]\.\s*/, '');
    btn.disabled = true;
    if (optWord === correct) btn.classList.add('correct');
    else if (optWord === chosen && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('faded');
  });

  // Show explanation
  const w = mcqWords[mcqIdx];
  const exp = document.getElementById('mcq-explanation');
  exp.style.display = 'block';
  exp.innerHTML = `
    <span style="font-weight:800;color:${isCorrect ? '#0d9488' : '#dc2626'}">${isCorrect ? '✓ 答對了！' : '✗ 答錯了'}</span>
    — <strong>${w.w}</strong>: ${w.zh}<br>
    ${w.ex ? `<em>${w.ex}</em><br><span style="color:#94a3b8">${w.exz || ''}</span>` : ''}
  `;

  document.getElementById('mcq-score-disp').textContent = `得分: ${mcqScore} / ${mcqIdx + 1}`;

  const nextBtn = document.getElementById('mcq-next-btn');
  if (nextBtn) nextBtn.classList.add('visible');
}

function nextMCQ() {
  mcqIdx++;
  mcqAnswered = false;
  renderMCQCard();
}

function renderMCQResult(sec) {
  const pct = mcqWords.length > 0 ? Math.round(mcqScore / mcqWords.length * 100) : 0;
  sec.innerHTML = `
    <div class="fc-result">
      <div class="fc-result-emoji">${pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚'}</div>
      <div class="fc-result-title">${pct >= 80 ? '答題高手！' : pct >= 50 ? '表現不錯！' : '繼續加油！'}</div>
      <div class="fc-result-sub">答對 ${mcqScore} / ${mcqWords.length} 題 (${pct}%)</div>
      <button class="result-btn" onclick="retryMCQ()">重新練習</button>
      <button class="result-btn secondary" onclick="markDayDone(); closeModal()">標記今天完成 ✓</button>
    </div>
  `;
  markDayDone();
}

function retryMCQ() {
  mcqWords = [...modalWords];
  mcqIdx = 0;
  mcqScore = 0;
  mcqAnswered = false;
  renderMCQCard();
}

// ============================================================
// PROGRESS
// ============================================================
function markDayDone() {
  const dayKey = `day_${DAYS[currentDayIdx].day}`;
  progress[dayKey] = true;
  saveProgress(progress);
  updateProgress();
}

// ============================================================
// CONFETTI
// ============================================================
function launchConfetti() {
  const colors = ['#f97316','#06b6d4','#a855f7','#22c55e','#f43f5e','#eab308','#3b82f6','#ec4899'];
  const ox = window.innerWidth  / 2;
  const oy = window.innerHeight / 2;
  const GRAVITY = 0.45;
  const DRAG    = 0.985;

  for (let i = 0; i < 180; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const w = 4 + Math.random() * 14;
    const h = 4 + Math.random() * 14;
    el.style.cssText = `
      width:${w}px;height:${h}px;
      left:${ox}px;top:${oy}px;
      background:${colors[i % colors.length]};
      border-radius:${Math.random() > 0.45 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);

    // shoot in a full 360° fan but weighted upward
    const angle = (Math.random() * 260 - 220) * (Math.PI / 180); // -220° ~ 40°
    const speed = 10 + Math.random() * 14;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;
    let x = ox, y = oy, rot = Math.random() * 360;
    const rspeed = (Math.random() - 0.5) * 14;
    const delay  = Math.random() * 120;

    setTimeout(() => {
      (function tick() {
        vx *= DRAG; vy = vy * DRAG + GRAVITY;
        x += vx; y += vy; rot += rspeed;
        el.style.transform = `translate(${x - ox}px,${y - oy}px) rotate(${rot}deg)`;
        if (y < window.innerHeight + 40) {
          requestAnimationFrame(tick);
        } else {
          el.remove();
        }
      })();
    }, delay);
  }
}


// ============================================================
// KEYBOARD SHORTCUTS（閃卡）
// ============================================================
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('modal-overlay').classList.contains('open')) return;

  // ── 閃卡 ──
  if (currentTab === 'flash') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case 'ArrowRight': e.preventDefault(); fcNav(1);  break;
      case 'ArrowLeft':  e.preventDefault(); fcNav(-1); break;
      case 'ArrowDown':  e.preventDefault(); if (fcWords[fcIdx]) speakWord(fcWords[fcIdx].w); break;
      case ' ':
      case 'Enter':      e.preventDefault(); flipFC();  break;
    }
    return;
  }

  // ── 中翻英：答題後 Enter / 空白鍵下一題 ──
  if (currentTab === 'type' && typAnswered) {
    if (e.key === 'Enter' || e.key === ' ') {
      // 若事件來自格子本身，代表這次 Enter 是用來確認答案的，不跳題
      if (e.target.id && e.target.id.startsWith('typ-lb-')) return;
      e.preventDefault();
      nextTyping();
    }
  }
});
